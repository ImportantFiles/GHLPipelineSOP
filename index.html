<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline SOP Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 30px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
}

/* COLUMN */
.column {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    min-height: 500px;
}

.column h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #3b82f6;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.7);
}

.modal-content {
    background: #1e293b;
    margin: 5% auto;
    padding: 25px;
    width: 60%;
    border-radius: 12px;
}

.close {
    float: right;
    font-size: 22px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Pipeline SOP Dashboard</h1>

<div class="container">

    <!-- ONBOARDING -->
    <div class="column">
        <h2>Onboarding</h2>

        <button class="btn" onclick="openModal('hold')">Hold – Deposit Only</button>
        <button class="btn" onclick="openModal('kickoff')">Kickoff Call</button>
        <button class="btn" onclick="openModal('booked')">Booked for Onboarding</button>
        <button class="btn" onclick="openModal('kyc')">Waiting for KYC/KYB Approval</button>
        <button class="btn" onclick="openModal('funding')">Waiting to Go Live (Funding Pending)</button>
        <button class="btn" onclick="openModal('live')">Live & Connected</button>
        <button class="btn" onclick="openModal('pause')">On Pause (Client Request)</button>
        <button class="btn" onclick="openModal('nonresponsive')">Non-Responsive</button>
    </div>

    <!-- ACTIVE -->
    <div class="column">
        <h2>Active</h2>

        <button class="btn" onclick="openModal('<30days')">Live</button>
    </div>

    <!-- REFUND -->
    <div class="column">
        <h2>Refund</h2>

        <button class="btn" onclick="openModal('refund')">Refund Requested</button>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
const content = {

hold: `
<h2>Hold – Deposit Only</h2>
<p><b>Responsible:</b> Sales</p>
<p>Clients with partial payment. Onboarding is on hold.</p>
<ul>
<li>Full onboarding requires full payment</li>
<li>Early onboarding needs approval</li>
</ul>
<p><b>Action:</b></p>
<ul>
<li>Follow up for balance</li>
<li>Submit approval if needed</li>
</ul>
`,

kickoff: `
<h2>Kickoff Call</h2>
<p><b>Responsible:</b> Sales</p>
<p>Initial call to finalize deal and expectations.</p>
<ul>
<li>Confirm commitment</li>
<li>Align expectations</li>
</ul>
<p><b>Action:</b></p>
<ul>
<li>Conduct call</li>
<li>Transition to AM</li>
</ul>
`,

booked: `
<h2>Booked for Onboarding</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>Client signed and scheduled.</p>
<ul>
<li>Auto intro email triggered</li>
<li>Sales → AM handoff</li>
</ul>
<p><b>Action:</b></p>
<ul>
<li>Prepare onboarding</li>
<li>Confirm meeting</li>
</ul>
`,

kyc: `
<h2>Waiting for KYC/KYB Approval</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>Verification in progress.</p>
<ul>
<li>Broker-dependent timeline</li>
</ul>
<p><b>Action:</b></p>
<ul>
<li>Assist submission</li>
<li>Follow up</li>
</ul>
`,

funding: `
<h2>Waiting to Go Live (Funding Pending)</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>Setup complete, awaiting funds.</p>
<p><b>Action:</b></p>
<ul>
<li>Confirm instructions</li>
<li>Track transfer</li>
</ul>
`,

live: `
<h2>Live & Connected</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>Account is active and trading.</p>
<p><b>Action:</b></p>
<ul>
<li>Monitor performance</li>
<li>Provide updates</li>
</ul>
`,

pause: `
<h2>On Pause (Client Request)</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>Activity paused by client.</p>
<p><b>Action:</b></p>
<ul>
<li>Document reason</li>
<li>Follow up</li>
</ul>
`,

nonresponsive: `
<h2>Non-Responsive</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>No response after multiple attempts.</p>
<p><b>Action:</b></p>
<ul>
<li>Log attempts</li>
<li>Send final notice</li>
</ul>
`,

refund: `
<h2>Refund Requested</h2>
<p><b>Responsible:</b> Account Manager</p>
<p>Client requested refund.</p>
<p><b>Action:</b></p>
<ul>
<li>Move deal</li>
<li>Submit request</li>
<li>Send to Slack</li>
<li>Update GHL</li>
</ul>
`

};

function openModal(key) {
    document.getElementById("modal-body").innerHTML = content[key];
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
