<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline SOP</title>

<style>
:root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #222;
}

body.dark {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #eee;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
}

.header {
    display: flex;
    gap: 10px;
    padding: 15px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 250px;
}

.toggle {
    cursor: pointer;
    padding: 10px;
    border-radius: 8px;
    background: var(--card);
}

.tabs {
    display: flex;
    gap: 10px;
    padding: 0 15px;
}

.tab {
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
    background: var(--card);
}

.tab.active {
    font-weight: bold;
}

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap: 15px;
}

.btn {
    padding: 12px;
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    border: none;
    text-align: left;
}

.btn:hover {
    opacity: 0.8;
}

.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
}

.modal-box {
    background: var(--card);
    margin: 5% auto;
    padding: 20px;
    width: 60%;
    border-radius: 12px;
}

.close {
    float: right;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <input id="search" placeholder="Search..." onkeyup="render()">
    <div class="toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="setTab('onboarding')">Onboarding</div>
    <div class="tab" onclick="setTab('active')">Active</div>
    <div class="tab" onclick="setTab('refunds')">Refunds</div>
</div>

<div class="container">
    <div id="grid" class="grid"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="content"></div>
  </div>
</div>

// ================== END ADMIN ==================

let currentTab = "onboarding";

function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");
    render();
}

function render() {
    let grid = document.getElementById("grid");
    let search = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";

    Object.entries(DATA[currentTab]).forEach(([title, content])=>{
        if (!title.toLowerCase().includes(search)) return;

        let btn = document.createElement("button");
        btn.className = "btn";
        btn.innerHTML = "📄 " + title;
        btn.onclick = ()=>openModal(title, content);
        grid.appendChild(btn);
    });
}

function openModal(title, content) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("content").innerHTML = `<h2>${title}</h2>` + content;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function toggleDark() {
    document.body.classList.toggle("dark");
}

render();

</script>

</body>
</html>
